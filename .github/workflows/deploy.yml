name: Deploy AgriSense AI Agents

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env files on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cat > /home/ubuntu/agrisense-agents/.env << 'ENVEOF'
            ${{ secrets.BACKEND_ENV }}
            ENVEOF

            cat > /home/ubuntu/agrisense-agents/hashgraph/.env << 'ENVEOF'
            ${{ secrets.HASHGRAPH_ENV }}
            ENVEOF

      - name: Deploy backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/agrisense-agents
            git pull origin main

            # Build and run FastAPI backend
            docker build -t agrisense-backend .
            docker stop agrisense-backend || true
            docker rm agrisense-backend || true
            docker run -d \
              --name agrisense-backend \
              --restart always \
              -p 8000:8000 \
              --env-file .env \
              agrisense-backend

            # Install and run Node.js hashgraph server
            cd hashgraph
            npm install
            pm2 stop hashgraph || true
            pm2 start index.js --name hashgraph
            pm2 save

            echo "Deployment complete!"
            docker ps
            pm2 list